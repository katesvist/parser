services:
  worker-ingest:
    build: .
    command: npm run start:worker-ingest
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./config:/app/config:ro
    networks:
      - stack
  worker-docs:
    build: .
    command: npm run start:worker-docs
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./config:/app/config:ro
    networks:
      - stack
  worker-analytics:
    build: .
    command: npm run start:worker-analytics
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./config:/app/config:ro
    networks:
      - stack

networks:
  stack:
    external: true
    name: ${STACK_NETWORK:-tender-stack_default}
